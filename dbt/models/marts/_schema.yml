version: 2

models:
  - name: dim_channel
    columns:
      - name: channel_sk
        data_tests: [unique, not_null]
      - name: channel
        data_tests: [not_null]

  - name: dim_product
    description: "SCD Type 2 product dimension with price + grade history."
    columns:
      - name: product_sk
        data_tests: [unique, not_null]
      - name: product_id
        data_tests: [not_null]

  - name: dim_date
    columns:
      - name: date_key
        data_tests: [unique, not_null]

  - name: fct_sales
    description: "Order-grain sales fact (incremental), conformed from both channels."
    columns:
      - name: order_id
        data_tests: [unique, not_null]
      - name: channel_sk
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_channel')
              field: channel_sk
      - name: product_sk
        data_tests:
          - relationships:
              to: ref('dim_product')
              field: product_sk
      - name: revenue_usd
        data_tests: [not_null]

  - name: fct_settlement
    description: "Settlement-grain fact (incremental): cash remitted per order."
    columns:
      - name: settlement_id
        data_tests: [unique, not_null]
      - name: channel_sk
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_channel')
              field: channel_sk

  - name: mart_reconciliation
    description: "Order-grain reconciliation: booked sales revenue vs cash remitted."
    columns:
      - name: order_id
        data_tests: [unique, not_null]
      - name: booked_usd
        data_tests: [not_null]

  - name: agg_channel_daily
    columns:
      - name: channel_name
        data_tests: [not_null]
      - name: order_date
        data_tests: [not_null]

exposures:
  - name: grafana_reconciliation_dashboard
    type: dashboard
    maturity: medium
    url: http://localhost:3000/d/commerce-lakehouse
    description: >
      Grafana serving dashboard built on the Gold marts, published to a Postgres
      serving DB. Consumes agg_channel_daily and mart_reconciliation to show
      channel performance and sales-vs-cash reconciliation (booked, settled,
      fees, uncollected). Provisioned as code under serving/grafana/.
    depends_on:
      - ref('agg_channel_daily')
      - ref('mart_reconciliation')
    owner:
      name: Trang Nguyen
