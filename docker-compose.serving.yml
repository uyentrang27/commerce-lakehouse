# Serving lane — Postgres serving DB + Grafana dashboards (all on Linux, no
# Power BI / Windows needed). The Gold marts are published to Postgres by
# serving/load_to_postgres.py; Grafana reads Postgres natively with datasource +
# dashboard provisioned as code.
#
#   docker compose -f docker-compose.serving.yml up -d   # Postgres + Grafana
#   make serving-load                                     # Gold marts -> Postgres
#   open http://localhost:3000  (anonymous viewer enabled)
#   docker compose -f docker-compose.serving.yml down -v
services:
  postgres:
    image: postgres:16-alpine
    container_name: commerce-postgres
    environment:
      POSTGRES_USER: grafana
      POSTGRES_PASSWORD: grafana
      POSTGRES_DB: serving
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grafana -d serving"]
      interval: 5s
      timeout: 5s
      retries: 12

  grafana:
    image: grafana/grafana:11.2.0
    container_name: commerce-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
      # Server-side PNG rendering via the renderer service (profile: render).
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
    volumes:
      - ./serving/grafana/provisioning:/etc/grafana/provisioning
      - ./serving/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy

  # Optional: headless-Chromium renderer for /render PNG screenshots.
  #   docker compose -f docker-compose.serving.yml --profile render up -d
  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: commerce-grafana-renderer
    profiles: ["render"]
    environment:
      ENABLE_METRICS: "false"
