name: CI

# Lint the data stack, run the whole medallion pipeline on a small synthetic
# scale (dbt tests + the data-quality gate), then publish the Gold marts to the
# serving layer over Docker — so a broken transform, a failing DQ check, or a
# serving lane that no longer reaches Postgres all turn the build red.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check scripts spark benchmark dags streaming serving

  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PySpark 3.5 runs on a JDK; Temurin 17 is the officially supported combo.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install the data stack (.venv)
        run: make install

      - name: Run pipeline (generate -> bronze -> silver -> dbt snapshot/run/test -> validate)
        run: make pipeline SCALE=50000

  # The pipeline job stops at Gold. This one covers the last mile — Gold ->
  # Postgres -> Grafana — and deliberately takes the Docker route the README
  # documents, not the host venv. The loader is only interesting when it has to
  # read the warehouse out of a named volume and reach Postgres by service name;
  # running it on the host would pass for the wrong reason, because `make
  # pipeline` leaves a warehouse file sitting there for it to find.
  serving:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # No layer cache: the image is rebuilt from scratch each run (~5 min), which
      # also keeps requirements.txt honest — a missing pin fails here, not on a
      # laptop that happens to have the package already.
      - name: Build the pipeline image
        run: docker compose build

      - name: Run the pipeline (warehouse lands in the named volume)
        run: SCALE=50000 docker compose run --rm pipeline

      - name: Start Postgres + Grafana
        run: make serving-up

      - name: Publish Gold marts from the warehouse volume
        run: make serving-load-docker

      - name: Assert the served marts match Gold
        run: make serving-verify-docker

      # Grafana exits on a malformed provisioning file, so a reachable /api/health
      # is also proof the datasource and dashboard YAML still parse.
      - name: Check Grafana came up with its provisioning intact
        run: curl -fsS --retry 10 --retry-delay 3 --retry-all-errors http://localhost:3000/api/health

      - name: Stop the serving stack
        if: always()
        run: make serving-down
